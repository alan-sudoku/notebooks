name: Mirror to Codeberg

on:
  push:
    branches: [ '**' ]
    tags: [ '**' ]
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  codeberg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential to fetch all history and branches

      - name: Mirror to Codeberg
        uses: cssnr/mirror-repository-action@v1
        with:
          host: https://codeberg.org
          username: alan-sudoku # Replace with your Codeberg username
          password: ${{ secrets.CODEBERG_TOKEN }}